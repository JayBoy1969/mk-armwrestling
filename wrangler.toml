name = "mk-armwrestling"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# The @astrojs/cloudflare adapter generates the Worker entry + static-assets
# config (dist/server/wrangler.json) at build time; this file only declares the
# project name, runtime flags, and bindings.

# MK_AW_BLOG_POSTS namespace — used for blog posts (BLOG_KV) and the Astro
# session store the adapter requires (SESSION). Sessions are unused, so sharing
# the namespace is harmless.
[[kv_namespaces]]
binding = "BLOG_KV"
id = "45ccd4f791c54858ad82a63a54310513"

[[kv_namespaces]]
binding = "SESSION"
id = "45ccd4f791c54858ad82a63a54310513"
